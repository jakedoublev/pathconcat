name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod tidy
      - name: check go mod tidy
        run: git diff --exit-code go.mod go.sum
      - run: go vet ./...
      - run: go test ./... -race
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.8.0
